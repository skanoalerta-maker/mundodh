<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mundo D&H | Catálogo comercial</title>

  <meta
    name="description"
    content="Catálogo comercial Mundo D&H. Productos con precio, stock y cotización por WhatsApp."
  />

  <meta name="theme-color" content="#c8102e" />

  <link rel="stylesheet" href="style.css" />

  <style>
    .catalog-page{
      padding:26px 0 40px;
      background:#f7f9fc;
      min-height:100vh;
    }

    .catalog-hero{
      background:
        radial-gradient(circle at top right, rgba(255,255,255,.10), transparent 24%),
        linear-gradient(135deg, #c8102e 0%, #9f0f25 100%);
      color:#fff;
      border-radius:28px;
      padding:30px 26px;
      box-shadow:0 20px 48px rgba(159,15,37,.18);
      margin-top:24px;
      margin-bottom:18px;
    }

    .catalog-hero h1{
      margin:0 0 10px;
      font-size:42px;
    }

    .catalog-tools{
      margin-top:18px;
      display:grid;
      grid-template-columns:1.2fr .8fr .8fr .8fr;
      gap:12px;
    }

    .catalog-tools input,
    .catalog-tools select{
      width:100%;
      border:1px solid #dbe3ee;
      border-radius:14px;
      padding:14px;
      background:#fff;
    }

    .catalog-summary{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:14px;
      margin:18px 0;
    }

    .summary-card{
      background:#fff;
      border-radius:20px;
      padding:18px;
      box-shadow:0 10px 24px rgba(20,32,51,.05);
      text-align:center;
    }

    .summary-card strong{
      display:block;
      font-size:26px;
      color:#132033;
    }

    .catalog-grid{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:16px;
    }

    @media (max-width:820px){
      .catalog-grid{
        grid-template-columns:repeat(2, 1fr);
      }

      .catalog-tools{
        grid-template-columns:1fr 1fr;
      }

      .catalog-summary{
        grid-template-columns:1fr 1fr;
      }
    }

    @media (max-width:620px){
      .catalog-grid,
      .catalog-tools,
      .catalog-summary{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>

<body>

  <main class="catalog-page">
    <div class="wrap">

      <section class="catalog-hero">
        <h1>Catálogo Mundo D&H</h1>
        <p>Productos para empresas, oficinas y pymes con atención directa y cotización rápida.</p>

        <div class="catalog-tools">
          <input type="text" id="searchInput" placeholder="Buscar producto..." />
          <select id="categoryFilter"></select>
          <select id="brandFilter"></select>
          <select id="stockFilter">
            <option value="">Todo stock</option>
            <option value="con">Disponible</option>
            <option value="bajo">Stock bajo</option>
            <option value="sin">Sin stock</option>
          </select>
        </div>
      </section>

      <!-- 🔥 RESUMEN LIMPIO (SIN MARGEN) -->
      <section class="catalog-summary">
        <div class="summary-card">
          <strong id="summaryProducts">0</strong>
          <span>Productos</span>
        </div>

        <div class="summary-card">
          <strong id="summaryCategories">0</strong>
          <span>Categorías</span>
        </div>

        <div class="summary-card">
          <strong id="summaryBrands">0</strong>
          <span>Marcas</span>
        </div>

        <div class="summary-card">
          <strong>Catálogo</strong>
          <span>Actualizado</span>
        </div>
      </section>

      <section id="catalogGrid" class="catalog-grid"></section>

    </div>
  </main>

  <script src="catalogo.js"></script>

</body>
</html>
